# Test configuration
spring.datasource.url=jdbc:tc:postgresql:15:///testdb?TC_REUSABLE=true
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

linear.api.key=test-linear-key
linear.api.url=http://localhost:${wiremock.server.port}/graphql
linear.webhook.secret=test-linear-secret
linear.team.id=test-team-id

clickup.api.key=test-clickup-key
clickup.api.url=http://localhost:${wiremock.server.port}/clickup
clickup.webhook.secret=test-clickup-secret
clickup.workspace.id=test-workspace-id
clickup.list.id=test-list-id

sync.loop-prevention.ttl-seconds=5
sync.loop-prevention.max-cache-size=100

logging.level.com.externconnector=DEBUG
