# =====================================================
# ExternConnector Linear-ClickUp Sync
# Application Configuration
# =====================================================

# Server
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Application
spring.application.name=linear-clickup-sync

# =====================================================
# Database
# =====================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=ExternConnectorPool

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# =====================================================
# Linear API
# =====================================================
linear.api.key=${LINEAR_API_KEY}
linear.api.url=https://api.linear.app/graphql
linear.webhook.secret=${LINEAR_WEBHOOK_SECRET}
linear.team.id=${LINEAR_TEAM_ID}

# =====================================================
# ClickUp API
# =====================================================
clickup.api.key=${CLICKUP_API_KEY}
clickup.api.url=https://api.clickup.com/api/v2
clickup.webhook.secret=${CLICKUP_WEBHOOK_SECRET}
clickup.workspace.id=${CLICKUP_WORKSPACE_ID}
clickup.list.id=${CLICKUP_LIST_ID}

# =====================================================
# Webhook processing
# =====================================================
webhook.max-payload-bytes=1048576
webhook.replay-window-seconds=300
webhook.idempotency-ttl-seconds=86400

# =====================================================
# Sync loop prevention
# =====================================================
sync.loop-prevention.ttl-seconds=60
sync.loop-prevention.max-cache-size=10000

# =====================================================
# HTTP Clients
# =====================================================
http.client.connect-timeout-ms=5000
http.client.read-timeout-ms=10000
http.client.write-timeout-ms=10000

# =====================================================
# Resilience4j - Retry
# =====================================================
resilience4j.retry.instances.linear.max-attempts=3
resilience4j.retry.instances.linear.wait-duration=1s
resilience4j.retry.instances.linear.retry-exceptions=java.io.IOException,org.springframework.web.reactive.function.client.WebClientRequestException
resilience4j.retry.instances.linear.ignore-exceptions=com.externconnector.sync.exception.WebhookAuthException,com.externconnector.sync.exception.NonRetryableException
resilience4j.retry.instances.linear.enable-exponential-backoff=true
resilience4j.retry.instances.linear.exponential-backoff-multiplier=2

resilience4j.retry.instances.clickup.max-attempts=3
resilience4j.retry.instances.clickup.wait-duration=1s
resilience4j.retry.instances.clickup.retry-exceptions=java.io.IOException,org.springframework.web.reactive.function.client.WebClientRequestException
resilience4j.retry.instances.clickup.ignore-exceptions=com.externconnector.sync.exception.WebhookAuthException,com.externconnector.sync.exception.NonRetryableException
resilience4j.retry.instances.clickup.enable-exponential-backoff=true
resilience4j.retry.instances.clickup.exponential-backoff-multiplier=2

# =====================================================
# Resilience4j - Circuit Breaker
# =====================================================
resilience4j.circuitbreaker.instances.linear.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.linear.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.linear.slow-call-duration-threshold=3s
resilience4j.circuitbreaker.instances.linear.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.linear.sliding-window-size=10
resilience4j.circuitbreaker.instances.linear.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.linear.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.linear.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.clickup.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.clickup.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.clickup.slow-call-duration-threshold=3s
resilience4j.circuitbreaker.instances.clickup.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.clickup.sliding-window-size=10
resilience4j.circuitbreaker.instances.clickup.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.clickup.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.clickup.permitted-number-of-calls-in-half-open-state=3

# =====================================================
# Actuator / Health
# =====================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.enabled=true

# =====================================================
# Logging
# =====================================================
logging.level.com.externconnector=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# =====================================================
# Jackson
# =====================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
